services:
  db:
    image: postgres:16-alpine
    container_name: nl_consulting_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nl_consulting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nl_consulting"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nl_consulting_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobrescreve o DATABASE_URL para usar o container do Postgres
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/nl_consulting
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
